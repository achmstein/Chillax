# Caddy TLS reverse proxy overlay
# Usage: docker compose -f docker-compose.yaml -f docker-compose.caddy.yml up -d
#
# This is a separate compose file so it doesn't interfere with the
# Aspire-generated docker-compose.yaml.
#
# NOTE: The deploy workflow strips mobile-bff's host port mapping via sed
# before copying artifacts to the server, so Caddy can bind to ports 80/443.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - aspire
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./website:/srv/website:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mobile-bff

volumes:
  caddy_data:
  caddy_config:
