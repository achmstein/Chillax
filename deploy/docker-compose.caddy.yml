# Caddy TLS reverse proxy overlay
# Usage: docker compose -f docker-compose.yaml -f docker-compose.caddy.yml up -d
#
# This is a separate compose file so it doesn't interfere with the
# Aspire-generated docker-compose.yaml.
#
# Mobile-bff runs on port 5000 to avoid conflict with Caddy on port 80.
# Caddy handles TLS (Let's Encrypt) and proxies api.chillax.site → mobile-bff:5000.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - aspire
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./website:/srv/website:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - mobile-bff

volumes:
  caddy_data:
  caddy_config:
